version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: najeeb
      POSTGRES_PASSWORD: 47434
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: me@local.dev
      PGADMIN_DEFAULT_PASSWORD: 47434
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata: